<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mark Gottschalk | Dean, Tarrant County College</title>
    <style>
        /* Modern Design System Tokens */
        :root {
            --primary-color: #002D62; /* TCC Deep Blue */
            --secondary-color: #007A87; /* Professional Teal Accent */
            --text-dark: #1E293B; /* Slate 800 */
            --text-muted: #64748B; /* Slate 500 */
            --bg-gradient-start: #F8FAFC; /* Slate 50 */
            --bg-gradient-end: #F1F5F9; /* Slate 100 */
            --card-bg: #FFFFFF;
            --shadow-md: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        /* Base Resets */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        /* Card Container Styles */
        .profile-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            box-shadow: var(--shadow-md);
            width: 100%;
            max-width: 480px;
            padding: 40px;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease;
        }

        .profile-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-lg);
        }

        /* Academic Accent Top Bar */
        .profile-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
        }

        /* Profile Avatar Placeholder Icon (Academic / Leadership representation) */
        .avatar-container {
            width: 80px;
            height: 80px;
            background-color: #F1F5F9;
            border-radius: 50%;
            margin: 0 auto 24px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-color);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.06);
        }

        .avatar-container svg {
            width: 40px;
            height: 40px;
        }

        /* Institution Badge */
        .institution {
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--secondary-color);
            margin-bottom: 8px;
            display: inline-block;
        }

        /* Name Typography */
        h1 {
            font-size: 2.25rem;
            color: var(--primary-color);
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
            line-height: 1.2;
        }

        /* Job Position */
        .position {
            font-size: 1.15rem;
            color: var(--text-muted);
            font-weight: 500;
            margin-bottom: 24px;
        }

        /* Graphic Divider */
        .divider {
            width: 48px;
            height: 3px;
            background-color: var(--secondary-color);
            margin: 0 auto 28px auto;
            border-radius: 2px;
        }

        /* Dynamic Greeting Container */
        .dynamic-greeting {
            background-color: #F8FAFC;
            border-radius: 12px;
            padding: 14px 20px;
            font-size: 0.95rem;
            color: var(--text-dark);
            margin-bottom: 28px;
            border: 1px solid #E2E8F0;
            font-style: italic;
        }

        /* Call To Action Button (Level Up Link) */
        .btn-levelup {
            display: inline-block;
            width: 100%;
            background-color: var(--primary-color);
            color: #FFFFFF;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.05rem;
            padding: 14px 28px;
            border-radius: 12px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(0, 45, 98, 0.15);
        }

        .btn-levelup:hover {
            background-color: #001F42;
            box-shadow: 0 6px 16px rgba(0, 45, 98, 0.25);
            transform: translateY(-1px);
        }

        .btn-levelup:active {
            transform: translateY(1px);
            box-shadow: 0 2px 6px rgba(0, 45, 98, 0.15);
        }

        /* Touch target adjustments & responsiveness */
        @media (max-width: 480px) {
            .profile-card {
                padding: 32px 24px;
            }
            h1 {
                font-size: 1.85rem;
            }
        }
    </style>
</head>
<body>

    <main class="profile-card">
        <!-- Academic Crest/Avatar representation -->
        <div class="avatar-container">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4.26 10.147a60.438 60.438 0 0 0-.491 6.347A48.62 48.62 0 0 1 12 20.904a48.62 48.62 0 0 1 8.232-4.41 60.46 60.46 0 0 0-.491-6.347m-15.482 0a50.57 50.57 0 0 0-2.658-.813A59.906 59.906 0 0 1 12 3.493a59.903 59.903 0 0 1 10.399 5.84a50.578 50.578 0 0 0-2.658.814m-15.482 0A50.697 50.697 0 0 1 12 13.489a50.702 50.702 0 0 1 7.74-3.342M6.75 15a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5Zm0 0v-3.675A55.378 55.378 0 0 1 12 8.443m-7.007 11.55A5.981 5.981 0 0 0 6.75 15.75v-1.5" />
            </svg>
        </div>

        <span class="institution">Tarrant County College</span>
        <h1>Mark Gottschalk</h1>
        <p class="position">Dean</p>

        <div class="divider"></div>

        <!-- Dynamic Greeting powered by Javascript -->
        <div id="greeting-banner" class="dynamic-greeting">
            Welcome to my professional portal.
        </div>

        <!-- Action Link to Level Up page -->
        <a href="levelup.html" class="btn-levelup">Explore Level Up Program</a>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const greetingElement = document.getElementById('greeting-banner');
            const hour = new Date().getHours();
            let greetingTime = 'Welcome';

            if (hour < 12) {
                greetingTime = 'Good morning';
            } else if (hour < 17) {
                greetingTime = 'Good afternoon';
            } else {
                greetingTime = 'Good evening';
            }

            // Interactive personalized dynamic message
            greetingElement.textContent = `✨ ${greetingTime}! Welcome to my professional portal.`;
        });
    </script>
</body>
</html>
