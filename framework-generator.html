<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conceptual Framework Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #0d2240; --cyan-bright: #00b4d8; --sky: #e8f4fb; --white: #ffffff;
      --text: #111827; --border: #e2eaf3; --mod-accent: #22c55e; --mod-bg: #f0fdf4; --mod-border: #bbf7d0;
      --sidebar-w: 260px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--sky); height: 100vh; display: flex; flex-direction: column; }

    /* Layout */
    .layout { display: flex; flex: 1; overflow: hidden; }
    .sidebar { width: var(--sidebar-w); background: var(--navy); color: white; padding: 1.5rem; flex-shrink: 0; }
    .content-pane { flex: 1; overflow-y: auto; padding: 2rem; }
    
    /* Responsive Grid */
    .view-section { display: none; max-width: 1200px; margin: 0 auto; }
    .active-view { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
    @media (max-width: 900px) { .active-view { grid-template-columns: 1fr; } .sidebar { display: none; } }

    .form-group { margin-bottom: 1.25rem; }
    label { font-size: 0.8rem; font-weight: 700; color: var(--navy); text-transform: uppercase; margin-bottom: 0.4rem; display: block; }
    input, textarea, select { width: 100%; padding: 0.75rem; border: 1.5px solid var(--border); border-radius: 8px; font-family: inherit; background: var(--white); }
    .checkbox-group { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; font-size: 0.85rem; }
    
    .button-group { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-top: 1rem; }
    .begin-btn { background: var(--navy); color: var(--white); border: 2.5px solid var(--mod-accent); padding: 1rem; border-radius: 50px; font-weight: 700; cursor: pointer; }
    .reset-btn { background: transparent; color: var(--text-mid); border: 1.5px solid var(--border); padding: 1rem; border-radius: 50px; font-weight: 600; cursor: pointer; }
    
    .output-card { background: var(--white); padding: 1.5rem; border-radius: 12px; border: 1.5px solid var(--border); position: sticky; top: 1rem; }
    #prompt-output { width: 100%; height: 450px; font-family: monospace; font-size: 0.85rem; padding: 1rem; border: 1px solid var(--border); background: #f9fafb; resize: none; }
  </style>
</head>
<body>

<div class="layout">
    <nav class="sidebar">
        <div style="font-weight: 800; margin-bottom: 2rem; color: var(--cyan-bright);">Framework Builder</div>
        <div style="cursor:pointer; padding: 0.5rem; border-bottom: 1px solid #223755;" onclick="switchView('generator')">✍️ Prompt Generator</div>
        <div style="cursor:pointer; padding: 0.5rem;" onclick="switchView('guide')">📚 Educational Guide</div>
    </nav>

    <main class="content-pane">
        <div id="view-generator" class="view-section active-view">
            <div class="form-inputs">
                <div class="form-group"><label>Purpose Statement</label><textarea id="purpose" rows="2"></textarea></div>
                <div class="form-group"><label>Central Phenomenon</label><input type="text" id="phenomenon"></div>
                <div class="form-group"><label>Key Concepts</label><textarea id="concepts" rows="2"></textarea></div>
                <div class="form-group"><label>Theory & Components</label><input type="text" id="theory" placeholder="Theory Name..."><textarea id="theory-components" rows="2" placeholder="Relevant tenets/constructs..."></textarea></div>
                <div class="form-group"><label>Research Paradigm</label>
                    <div class="checkbox-group" id="paradigm-options">
                        <label><input type="checkbox" value="Positivist"> Positivist</label>
                        <label><input type="checkbox" value="Postpositivist"> Postpositivist</label>
                        <label><input type="checkbox" value="Constructivist"> Constructivist</label>
                        <label><input type="checkbox" value="Critical"> Critical</label>
                        <label><input type="checkbox" value="Pragmatic"> Pragmatic</label>
                    </div>
                </div>
                <div class="form-group"><label>Visual Structure</label>
                    <select id="structure">
                        <option value="Layered model">Layered model</option>
                        <option value="Funnel model">Funnel model</option>
                        <option value="Path Analysis">Path Analysis / Regression</option>
                        <option value="Moderation/Mediation">Moderation/Mediation</option>
                        <option value="Concept map">Concept map</option>
                    </select>
                </div>
                <div class="button-group">
                    <button class="begin-btn" onclick="generatePrompt()">Generate APA Prompt</button>
                    <button class="reset-btn" onclick="resetForm()">Reset Form</button>
                </div>
            </div>
            <div class="output-card">
                <h2>Generated Prompt</h2>
                <textarea id="prompt-output" readonly></textarea>
            </div>
        </div>
        
        <div id="view-guide" class="view-section">
            <div style="background:var(--white); padding:2rem; border-radius:12px;">
                <h3>Target Visual Layout</h3>
                <img src="Demo%20Conceptual%20Framework.png" alt="Reference Layout" style="width:100%; border-radius:8px; margin-top:1rem;">
            </div>
        </div>
    </main>
</div>

<script>
    function switchView(view) {
        document.getElementById('view-generator').classList.remove('active-view');
        document.getElementById('view-guide').classList.remove('active-view');
        document.getElementById('view-' + view).classList.add('active-view');
    }
    
    function resetForm() {
        if (confirm("Are you sure you want to clear all your entries?")) {
            document.querySelectorAll('input, textarea, select').forEach(el => {
                if (el.type === 'checkbox') el.checked = false;
                else el.value = '';
            });
            document.getElementById('prompt-output').value = '';
        }
    }

    function generatePrompt() {
        const paradigms = Array.from(document.querySelectorAll('#paradigm-options input:checked')).map(cb => cb.value).join(', ');
        const prompt = `[APA FORMATTING MANDATE: Professional APA 7th style.]
Create a conceptual framework for: ${document.getElementById('purpose').value}.
Focus: ${document.getElementById('phenomenon').value}.
Structure: ${document.getElementById('structure').value}.
Paradigm Logic (Use as filter, do not label on diagram): ${paradigms}.
Theory Components: ${document.getElementById('theory-components').value}.
Layout reference: https://mgottschalkcc.github.io/AI/Demo%20Conceptual%20Framework.png`;
        document.getElementById('prompt-output').value = prompt;
    }
</script>
</body>
</html>
