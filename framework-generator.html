<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conceptual Framework Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #0d2240; --cyan-bright: #00b4d8; --sky: #e8f4fb; --white: #ffffff;
      --text: #111827; --border: #e2eaf3; --mod-accent: #22c55e; --mod-bg: #f0fdf4; --mod-border: #bbf7d0;
      --sidebar-w: 296px; --header-h: 62px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--sky); height: 100vh; display: flex; flex-direction: column; }

    /* Top Bar */
    .top-bar { background: var(--navy); height: var(--header-h); display: flex; align-items: center; padding: 0 1.5rem; color: var(--white); flex-shrink: 0; }
    .hamburger { display: none; background: none; border: none; cursor: pointer; color: white; margin-right: 1rem; }

    /* Layout */
    .layout { display: flex; flex: 1; overflow: hidden; }
    .sidebar { width: var(--sidebar-w); background: var(--navy); color: white; display: flex; flex-direction: column; padding: 1rem; }
    .nav-item { display: block; padding: 0.75rem; color: #a1a1aa; text-decoration: none; border-radius: 8px; margin-bottom: 0.5rem; cursor: pointer; }
    .nav-item.active { background: rgba(34,197,94,0.18); color: white; font-weight: 700; }

    /* Main Content */
    .content-pane { flex: 1; overflow-y: auto; padding: 2rem; }
    .view-section { display: none; max-width: 1200px; margin: 0 auto; }
    .active-view { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }

    /* Form Styles */
    .form-group { margin-bottom: 1.25rem; }
    label { display: block; font-size: 0.8rem; font-weight: 700; color: var(--navy); text-transform: uppercase; margin-bottom: 0.4rem; }
    input, textarea, select { width: 100%; padding: 0.75rem; border: 1.5px solid var(--border); border-radius: 8px; font-family: inherit; }
    .checkbox-group { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
    .begin-btn { background: var(--navy); color: var(--white); border: 2.5px solid var(--mod-accent); padding: 1rem; border-radius: 50px; font-weight: 700; cursor: pointer; width: 100%; }

    /* Output */
    .output-card { background: var(--white); padding: 1.5rem; border-radius: 12px; border: 1.5px solid var(--border); position: sticky; top: 1rem; }
    #prompt-output { width: 100%; height: 400px; font-family: monospace; font-size: 0.85rem; padding: 1rem; border: 1px solid var(--border); background: #f9fafb; }

    @media (max-width: 768px) { .sidebar { display: none; } .hamburger { display: block; } .active-view { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<header class="top-bar">
    <button class="hamburger" onclick="toggleSidebar()">☰</button>
    <strong>Conceptual Framework Builder</strong>
</header>

<div class="layout">
    <nav class="sidebar" id="sidebar">
        <div class="nav-item active" onclick="switchView('generator')">✍️ Prompt Generator</div>
        <div class="nav-item" onclick="switchView('guide')">📚 Educational Guide</div>
        <a href="index.html" class="nav-item">← Back to Course</a>
    </nav>

    <main class="content-pane">
        <div id="view-generator" class="view-section active-view">
            <div class="form-inputs">
                <div class="form-group"><label>Purpose Statement</label><textarea id="purpose" rows="2"></textarea></div>
                <div class="form-group"><label>Central Phenomenon</label><input type="text" id="phenomenon"></div>
                <div class="form-group"><label>Key Concepts</label><textarea id="concepts" rows="2"></textarea></div>
                <div class="form-group"><label>Theory & Components</label><input type="text" id="theory" placeholder="Theory Name..."><textarea id="theory-components" rows="2" placeholder="Key tenets/constructs..."></textarea></div>
                <div class="form-group"><label>Research Paradigm</label>
                    <div class="checkbox-group" id="paradigm-options">
                        <label><input type="checkbox" value="Positivist"> Positivist</label>
                        <label><input type="checkbox" value="Postpositivist"> Postpositivist</label>
                        <label><input type="checkbox" value="Constructivist"> Constructivist</label>
                        <label><input type="checkbox" value="Critical"> Critical</label>
                        <label><input type="checkbox" value="Pragmatic"> Pragmatic</label>
                    </div>
                </div>
                <div class="form-group"><label>Visual Structure</label>
                    <select id="structure">
                        <option value="Layered model">Layered model</option>
                        <option value="Funnel model">Funnel model</option>
                        <option value="Path Analysis">Path Analysis / Regression</option>
                        <option value="Moderation/Mediation">Moderation/Mediation</option>
                        <option value="Concept map">Concept map</option>
                    </select>
                </div>
                <div class="form-group"><label>Visual Legend</label><input type="text" id="legend"></div>
                <button class="begin-btn" onclick="generatePrompt()">Generate APA Framework Prompt</button>
            </div>
            <div class="output-card">
                <h2>Generated Prompt</h2>
                <textarea id="prompt-output" readonly></textarea>
            </div>
        </div>
        
        <div id="view-guide" class="view-section">
            <div class="guide-card">
                <h3>Target Visual Layout</h3>
                <img src="Demo%20Conceptual%20Framework.png" alt="Reference Layout" style="width:100%; border-radius:8px;">
            </div>
        </div>
    </main>
</div>

<script>
    function switchView(view) {
        document.getElementById('view-generator').classList.remove('active-view');
        document.getElementById('view-guide').classList.remove('active-view');
        document.getElementById('view-' + view).classList.add('active-view');
        
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        sidebar.style.display = sidebar.style.display === 'flex' ? 'none' : 'flex';
    }

    function generatePrompt() {
        const paradigms = Array.from(document.querySelectorAll('#paradigm-options input:checked')).map(cb => cb.value).join(', ');
        const prompt = `[APA FORMATTING MANDATE: Professional APA 7th style.]
Create a conceptual framework for: ${document.getElementById('purpose').value}.
Focus: ${document.getElementById('phenomenon').value}.
Structure: ${document.getElementById('structure').value}.
Paradigm Logic (Use as filter, do not label on diagram): ${paradigms}.
Theory Components: ${document.getElementById('theory-components').value}.
Legend: ${document.getElementById('legend').value}.
Layout reference: https://mgottschalkcc.github.io/AI/Demo%20Conceptual%20Framework.png`;

        document.getElementById('prompt-output').value = prompt;
    }
</script>
</body>
</html>
